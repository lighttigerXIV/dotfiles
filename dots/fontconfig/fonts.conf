<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <alias>
  <family>terminal-font</family>
  <prefer>
   <family>0xProto Nerd Font Mono</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>0xProto Nerd Font Mono</family>
  <prefer>
   <family>0xProto Nerd Font Propo</family>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <alias>
  <family>Nunito</family>
  <prefer>
   <family>Nunito</family>
   <family>Noto Color Emoji</family>
   <family>FiraCode Nerd Font Propo</family>
  </prefer>
 </alias>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintfull</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
 </match>
 <edit binding="strong" mode="prepend" name="family">
  <string>Symbols Nerd Font Mono</string>
 </edit>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
</fontconfig>
